             background-color: rgba(255,255,255,0.3);

         }

      const container = document.getElementById('favorites-container');
      const emptyMessage = document.getElementById('empty-message');

      // Функция для отображения списка избранного
      function showFavorites() {
          // Получаем список ID из памяти браузера
          const favorites = JSON.parse(localStorage.getItem('lada_favorites')) || [];
          
          // Очищаем контейнер перед загрузкой
          container.innerHTML = '';

          if (favorites.length === 0) {
              // Если список пуст, показываем сообщение
              emptyMessage.style.display = 'block';
              return; // Останавливаем функцию
          } else {
              emptyMessage.style.display = 'none';
          }

          // Проходим по всем машинам в базе данных
          allCars.forEach(car => {
              // Проверяем, есть ли ID этой машины в списке избранного пользователя
              if (favorites.includes(car.id)) {
                  // Если есть - создаем карточку для отображения
                  createFavoriteCard(car);
              }
          });
      }


      // Функция для создания карточки на странице "Избранное"
      function createFavoriteCard(car) {
          const cardDiv = document.createElement('div');
          cardDiv.classList.add('car-card');
          
          cardDiv.innerHTML = `
              <div class="car-card-image">
                  <img src="${car.image_url}" alt="${car.name}">
              </div>
              <div class="car-card-content">
                  <h3 class="car-title">${car.name}</h3>
                  <p class="car-price">${car.price}</p>
                  <button class="remove-fav-btn" onclick="removeFromFavorites('${car.id}')">
                      Удалить из избранного
                  </button>
              </div>
          `;
          
          container.appendChild(cardDiv);
      }


      // Функция для удаления из избранного (работает на странице favorites.html)
      function removeFromFavorites(carId) {
          let favorites = JSON.parse(localStorage.getItem('lada_favorites')) || [];
          
          // Фильтруем массив, удаляя выбранный ID
          favorites = favorites.filter(id => id !== carId);
          
          // Сохраняем обновленный список обратно в память браузера
          localStorage.setItem('lada_favorites', JSON.stringify(favorites));
          
          // Обновляем страницу, чтобы изменения отобразились сразу
          showFavorites(); 
      }


      // Запускаем отображение при загрузке страницы
      document.addEventListener('DOMContentLoaded', showFavorites);


      /* --- ВАЖНО! ---
         Теперь нужно изменить логику добавления в избранное на всех страницах (Lada.html и др.),
         чтобы она работала с этим массивом allCars. Замените функцию toggleFav на эту:
      */
      window.toggleFav = function(button) {
          const carId = button.getAttribute('data-id');
          
          let favorites = JSON.parse(localStorage.getItem('lada_favorites')) || [];
          
          const isFavorite = favorites.includes(carId);
          
          if (isFavorite) {
              favorites = favorites.filter(id => id !== carId);
          } else {
              favorites.push(carId);
          }
          
          localStorage.setItem('lada_favorites', JSON.stringify(favorites));
          
          // Обновляем вид кнопки (звездочка и текст)
          updateFavButton(button, !isFavorite);
      };
      
      window.updateFavButton = function(button, isAdded) {
          if (isAdded) {
             button.classList.add('added');
             button.innerHTML = '<span>★</span> В избранном';
         } else {
             button.classList.remove('added');
             button.innerHTML = '<span>☆</span> В избранное';
         }
      };
      
    </script>
    <script>
    // Получаем кнопку и тело страницы
    const themeToggleBtn = document.getElementById('theme-toggle');
    const body = document.body;

    // Проверяем, была ли тема сохранена в LocalStorage (например, если пользователь уже выбирал её)
    const savedTheme = localStorage.getItem('theme');

    // Если сохранена темная тема, сразу применяем её при загрузке страницы
    if (savedTheme === 'dark') {
        body.classList.add('dark-theme');
        // Меняем иконку на солнышко, если нужно
        themeToggleBtn.textContent = '☀️';
    }

    // Добавляем обработчик клика на кнопку
    themeToggleBtn.addEventListener('click', () => {
        // Переключаем класс dark-theme у тега body
        body.classList.toggle('dark-theme');
        
        // Проверяем, активна ли темная тема сейчас
        const isDark = body.classList.contains('dark-theme');
        
        // Меняем иконку в зависимости от темы
        themeToggleBtn.textContent = isDark ? '☀️' : '🌙';
        
        // Сохраняем выбор пользователя в LocalStorage, чтобы тема не сбрасывалась при перезагрузке
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
</script>
